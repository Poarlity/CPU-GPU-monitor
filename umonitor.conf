# ============================================================
# UMonitor Configuration
# ============================================================
# Copy this file and edit values to match your environment.
# Lines starting with # are comments.

# Name of the conda environment to activate before launch.
# Example: CONDA_ENV="myenv"
CONDA_ENV="base"

# Optional: full path to conda installation directory.
# Leave empty to auto-detect (checks ~/anaconda3, ~/miniconda3, /opt/conda).
# Example: CONDA_PATH="/home/user/miniconda3"
CONDA_PATH=""

# Optional: full path to the UMonitor project directory.
# Leave empty to use the directory containing this script.
# Example: UMONITOR_DIR="/home/user/projects/umonitor"
UMONITOR_DIR=""

# Refresh interval in seconds (0.5, 1.0, 2.0, 5.0).
# Override with the R key at runtime.
REFRESH_INTERVAL="1.0"
